services:
  # Frontend: Astro App
  proptech-web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - AI_SERVICE_URL=http://ai-brain:8000
      - NODE_ENV=production
    depends_on:
      - ai-brain

  # AI Brain: FastAPI + Ollama (Local) o API (Cloud)
  ai-brain:
    build: ./services/ai-brain
    ports:
      - "8000:8000"
    volumes:
      - ./database.sqlite:/app/database.sqlite
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - SCRAPER_URL=http://scraper:8001/scan
      - TEXT_MODEL=gemma
      - VISION_MODEL=llava

  # Scraper: FastAPI + Playwright
  scraper:
    build: ./services/scraper
    ports:
      - "8001:8001"
    environment:
      - ASTRO_API_URL=http://proptech-web:3000/api/properties/analyze

networks:
  default:
    name: proptech-network
